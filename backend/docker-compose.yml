version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ngo_db
    environment:
      POSTGRES_DB: ngo_db
      POSTGRES_USER: ngo_user
      POSTGRES_PASSWORD: ngo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: ngo_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://ngo_user:ngo_password@postgres:5432/ngo_db
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ngo_network

volumes:
  postgres_data:

networks:
  ngo_network:
    driver: bridge
